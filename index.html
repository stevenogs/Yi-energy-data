<!DOCTYPE html>
<html lang="zh-TW">
<head>
   <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta charset="UTF-8">
    <title>Yi Energy Monitor V1.0.4</title>
    <script src="https://cdn.jsdelivr.net/npm/lunar-javascript/lunar.js"></script>
    <style>
    body { background-color: #050505; color: #d0d0d0; font-family: 'Consolas', monospace; padding: 10px; }
    
    /* 改用百分比寬度，手機上會自動延展 */
    .monitor-card { 
        background: #111; 
        border: 1px solid #333; 
        padding: 20px; 
        border-radius: 12px; 
        width: 95%; /* 手機佔滿螢幕寬度 */
        max-width: 500px; 
        margin: auto; 
    }
    
    h1 { color: #64ffda; font-size: 16px; border-bottom: 1px solid #333; padding-bottom: 10px; }
    .score-box { font-size: 18px; margin: 15px 0; line-height: 1.6; }
    .log-list { font-size: 13px; color: #888; margin-top: 15px; }
    .status-tag { color: #fff; background: #222; padding: 4px 10px; border-radius: 6px; display: inline-block; }
</style>
    </style>
</head>
<body>

<div class="monitor-card">
    <h1>⚙️ Yi Energy Engine V1.0.4</h1>
    <div id="display">正在進行時空矩陣運算...</div>
</div>

<script>
class YiEnergyEngine {
  constructor() {
    this.origin_matrix = { "shen": true, "zi": true, "chen": true, "xu": true };
  }

  _countOccurrences(arr, val) { return arr.filter(item => item === val).length; }

  calculateStresses(year, month, day, hour) {
    const solar = Solar.fromYmdHms(year, month, day, hour, 0, 0);
    const lunar = Lunar.fromSolar(solar);
    const eight = lunar.getEightChar();
    
    const allZhi = [eight.getYearZhi(), eight.getMonthZhi(), eight.getDayZhi(), eight.getTimeZhi()];
    const allGan = [eight.getYearGan(), eight.getMonthGan(), eight.getDayGan(), eight.getTimeGan()];
    const hZhi = eight.getTimeZhi();
    
    let wealthScore = 1.0, stressScore = 1.0, activeStatuses = [], logs = [];

    // --- 【邏輯 A】水為核心 ---
    let waterElements = this._countOccurrences(allZhi, "子") + this._countOccurrences(allGan, "壬") + this._countOccurrences(allGan, "癸");
    if (allZhi.includes("子")) { wealthScore += 2.5; activeStatuses.push("WEALTH_FLOW"); logs.push("🌊 財星大潮解鎖"); }
    else if (waterElements > 0) { wealthScore += (waterElements * 0.8); activeStatuses.push("WEALTH_READY"); logs.push("💰 財星浮頭"); }

    if (["申", "酉"].includes(hZhi)) {
      wealthScore += 1.0;
      if (!activeStatuses.includes("WEALTH_FLOW") && !activeStatuses.includes("WEALTH_READY")) activeStatuses.push("PRODUCTION_ON");
      logs.push("🔨 食傷產線送料");
    }

    // --- 【邏輯 B】環境熔斷 ---
    let xuCount = this._countOccurrences(allZhi, "戌");
    if (xuCount > 0 && this.origin_matrix["chen"]) {
      stressScore += (xuCount * 1.5); activeStatuses.push("TURBULENCE"); logs.push("💥 辰戌大衝");
    }
    if (allGan.includes("乙") && allGan.includes("庚")) {
      stressScore -= 1.0; wealthScore += 0.5; activeStatuses.push("STRESS_VALVE"); logs.push("🤝 乙庚合金壓力分流");
    }

    // --- 【邏輯 C】靈魂定錨 ---
    if (allZhi.includes("午") && this.origin_matrix["xu"]) { wealthScore += 0.5; activeStatuses.push("ANCHORED"); logs.push("🔥 午戌半合補能"); }
    if (allZhi.includes("未") && (allZhi.includes("辰") || this.origin_matrix["chen"])) { activeStatuses.push("BREAKTHROUGH"); logs.push("🔨 辰未相破突破"); }

    // --- 【邏輯 D】風險控制 ---
    let woodCount = this._countOccurrences(allZhi, "寅") + this._countOccurrences(allZhi, "卯");
    if (woodCount >= 1 && (allZhi.includes("申") || this.origin_matrix["shen"])) {
      stressScore += (woodCount * 1.2); activeStatuses.push("LOW_POWER_DEFENSE"); logs.push("🚨 強木克土防禦");
    }

    return {
      status: activeStatuses.length > 0 ? activeStatuses.join(" + ") : "NORMAL",
      wealth: Math.min(Math.max(wealthScore, 1.0), 5.0).toFixed(1),
      stress: Math.min(Math.max(stressScore, 1.0), 5.0).toFixed(1),
      logs: logs
    };
  }
}

// 執行與顯示
const now = new Date();
const engine = new YiEnergyEngine();
const report = engine.calculateStresses(now.getFullYear(), now.getMonth() + 1, now.getDate(), now.getHours());

document.getElementById('display').innerHTML = `
    <div class="score-box">👑 狀態: <span class="status-tag">${report.status}</span></div>
    <div>財氣指數: ${report.wealth} / 5.0</div>
    <div>內在應力: ${report.stress} / 5.0</div>
    <div class="log-list">${report.logs.map(l => '• ' + l).join('<br>')}</div>
`;
</script>
</body>
</html>
